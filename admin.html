<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중기넷 관리자</title>
  <meta name="theme-color" content="#0c2340" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .admin-card {
      background: #fff;
      border: 1px solid #e6edf5;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(14, 32, 63, 0.10);
      padding: 28px;
    }

    .admin-top {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .admin-title {
      margin: 0;
      font-size: 2rem;
      color: #0c2340;
      letter-spacing: -0.03em;
    }

    .admin-desc {
      margin: 10px 0 0;
      color: #6c7a90;
    }

    .admin-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    .admin-message {
      color: #6c7a90;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    .table-box {
      overflow: auto;
      border: 1px solid #e8eef6;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: #fff;
    }

    th {
      text-align: left;
      background: #f6f9fd;
      color: #0c2340;
      font-size: 0.92rem;
      padding: 14px 12px;
      border-bottom: 1px solid #e6edf5;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #eef3f8;
      color: #24344f;
      vertical-align: top;
      font-size: 0.94rem;
    }

    tr:hover td {
      background: #fbfdff;
    }

    @media (max-width: 820px) {
      .admin-controls {
        grid-template-columns: 1fr;
      }

      .admin-card {
        padding: 20px;
      }

      .admin-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a href="index.html" class="brand">
        <div class="brand-mark">중</div>
        <div class="brand-text">
          <strong>중기넷 관리자</strong>
          <span>접수 확인 · 운영 관리</span>
        </div>
      </a>

      <nav class="nav">
        <a class="btn btn-light" href="index.html">메인으로</a>
      </nav>
    </div>
  </header>

  <main class="admin-wrap">
    <section class="admin-card">
      <div class="admin-top">
        <div>
          <h1 class="admin-title">접수 목록</h1>
          <p class="admin-desc">저장된 현장 접수 내역을 확인하고 운영에 바로 반영할 수 있습니다.</p>
        </div>
      </div>

      <div class="admin-controls">
        <input type="password" id="adminKey" placeholder="관리자 키를 입력하세요" />
        <button class="btn btn-primary" id="loadBtn" type="button">목록 불러오기</button>
      </div>

      <div class="admin-message" id="adminMessage">관리자 키 입력 후 목록 불러오기를 누르세요.</div>

      <div class="table-box">
        <table id="requestTable">
          <thead>
            <tr>
              <th>접수시각</th>
              <th>구분</th>
              <th>대상</th>
              <th>장비/직종</th>
              <th>현장위치</th>
              <th>희망일시</th>
              <th>픽업</th>
              <th>희망지역</th>
              <th>이름</th>
              <th>연락처</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "여기에_현재_앱스크립트_URL_붙여넣기";

    const loadBtn = document.getElementById("loadBtn");
    const adminKeyInput = document.getElementById("adminKey");
    const adminMessage = document.getElementById("adminMessage");
    const tbody = document.querySelector("#requestTable tbody");

    loadBtn.addEventListener("click", async () => {
      const adminKey = adminKeyInput.value.trim();

      if (!adminKey) {
        adminMessage.textContent = "관리자 키를 입력해주세요.";
        return;
      }

      adminMessage.textContent = "불러오는 중입니다...";
      tbody.innerHTML = "";

      try {
        const res = await fetch(`${API_URL}?adminKey=${encodeURIComponent(adminKey)}`);
        const data = await res.json();

        if (!data.ok) {
          adminMessage.textContent = data.message || "목록을 불러오지 못했습니다.";
          return;
        }

        adminMessage.textContent = `총 ${data.rows.length}건을 불러왔습니다.`;

        data.rows.forEach((row) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.createdAt || ""}</td>
            <td>${row.requestType || ""}</td>
            <td>${row.targetType || ""}</td>
            <td>${row.item || ""}</td>
            <td>${row.location || ""}</td>
            <td>${row.dateTime || ""}</td>
            <td>${row.pickup || ""}</td>
            <td>${row.area || ""}</td>
            <td>${row.name || ""}</td>
            <td>${row.phone || ""}</td>
            <td>${row.memo || ""}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (error) {
        adminMessage.textContent = "네트워크 오류가 발생했습니다.";
      }
    });
  </script>
</body>
</html>
