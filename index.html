<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중기넷 | 건설장비 빠른 접수</title>
  <meta name="description" content="덤프·굴삭기 등 건설장비 빠른 접수 및 배차 연결" />
  <meta name="theme-color" content="#0f2747" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a href="#" class="brand">
        <div class="brand-mark">중</div>
        <div class="brand-text">
          <strong>중기넷</strong>
          <span>건설장비 배차 · 접수 플랫폼</span>
        </div>
      </a>

      <a class="btn btn-accent phone-link" href="tel:01049017168">📞 바로 문의</a>
    </div>
  </header>

  <section class="hero">
    <div class="wrap hero-grid">
      <div class="hero-copy">
        <div class="hero-badge">안성 · 평택 · 용인 중심 배차</div>
        <h1>필요한 장비를<br />빠르게 접수하세요</h1>
        <p>장비 요청, 기사·장비 등록, 빠른 문의를 한 화면에서 처리합니다.</p>

        <div class="hero-pills">
          <span>덤프</span>
          <span>굴삭기</span>
          <span>롤러</span>
          <span>도자</span>
          <span>그레이더</span>
        </div>
      </div>

      <div class="request-card" id="request-form">
        <div class="card-head">
          <div>
            <strong>빠른 접수</strong>
            <p>필수 항목만 입력하면 됩니다.</p>
          </div>
          <div class="status-badge">실시간 확인</div>
        </div>

        <form id="contactForm">
          <div class="field">
            <label>신청 구분 <span class="required">*</span></label>
            <div class="choice-grid" id="requestTypeGroup">
              <label class="choice-card active">
                <input type="radio" name="신청구분" value="구인" checked />
                <span>구인</span>
              </label>
              <label class="choice-card">
                <input type="radio" name="신청구분" value="구직" />
                <span>구직</span>
              </label>
            </div>
          </div>

          <div class="field">
            <label>신청 대상 <span class="required">*</span></label>
            <div class="choice-grid" id="targetTypeGroup">
              <label class="choice-card active">
                <input type="radio" name="신청대상" value="장비" checked />
                <span>장비</span>
              </label>
              <label class="choice-card">
                <input type="radio" name="신청대상" value="인력" />
                <span>인력</span>
              </label>
            </div>
          </div>

          <div id="equipmentSection">
            <div class="field">
              <label for="equipment">장비 선택 <span class="required">*</span></label>
              <select id="equipment">
                <option value="">선택하세요</option>
                <option>덤프 5톤</option>
                <option>덤프 15톤</option>
                <option>덤프 25톤</option>
                <option>굴삭기 미니</option>
                <option>굴삭기 03W</option>
                <option>굴삭기 06W</option>
                <option>굴삭기 10W</option>
                <option>굴삭기 380W</option>
                <option>롤러</option>
                <option>도자</option>
                <option>그레이더</option>
                <option>살수차</option>
                <option>로우더</option>
                <option>불도저</option>
              </select>
            </div>
          </div>

          <div id="workerSection" class="hidden">
            <div class="field">
              <label for="worker">인력 선택 <span class="required">*</span></label>
              <select id="worker">
                <option value="">선택하세요</option>
                <option>목수</option>
                <option>형틀목수</option>
                <option>철근공</option>
                <option>콘크리트공</option>
                <option>미장공</option>
                <option>타일공</option>
                <option>방수공</option>
                <option>조적공</option>
                <option>비계공</option>
                <option>해체공</option>
                <option>배관공</option>
                <option>설비공</option>
                <option>전기공</option>
                <option>용접공</option>
                <option>신호수</option>
                <option>곰방</option>
                <option>공구리</option>
                <option>잡부</option>
                <option>운반공</option>
                <option>소장</option>
                <option>반장</option>
                <option>현장보조</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="location">현장 위치 <span class="required">*</span></label>
            <input id="location" type="text" placeholder="예: 경기도 안성시 ○○현장" required />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="dateTime">희망 일시 <span class="required">*</span></label>
              <input id="dateTime" type="datetime-local" required />
            </div>

            <div class="field">
              <label for="phone">연락처 <span class="required">*</span></label>
              <input id="phone" type="tel" placeholder="010-1234-5678" required />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="name">이름 <span class="required">*</span></label>
              <input id="name" type="text" placeholder="신청자 이름" required />
            </div>

            <div class="field">
              <label for="memo">요청 내용</label>
              <input id="memo" type="text" placeholder="장비 대수, 작업 내용 등" />
            </div>
          </div>

          <div class="action-stack">
            <button class="btn btn-primary submit-btn" type="submit">🚀 빠르게 접수하기</button>

            <div class="sub-actions">
              <a class="btn btn-ghost phone-link" href="tel:01049017168">📞 전화</a>
              <a class="btn btn-ghost kakao-link" href="https://open.kakao.com/o/g5NbSfph" target="_blank" rel="noopener noreferrer">💬 카카오톡</a>
            </div>

            <div class="success-box" id="successBox"></div>
          </div>
        </form>
      </div>
    </div>
  </section>

  <section class="guide-section">
    <div class="wrap">
      <div class="guide-grid">
        <div class="guide-card">
          <strong>1. 접수</strong>
          <span>필수 정보 입력</span>
        </div>
        <div class="guide-card">
          <strong>2. 확인</strong>
          <span>관리자 확인 후 연락</span>
        </div>
        <div class="guide-card">
          <strong>3. 조율</strong>
          <span>시간·장비 조건 확인</span>
        </div>
        <div class="guide-card">
          <strong>4. 배차</strong>
          <span>가능 장비 빠르게 연결</span>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    © 2025 JUNGGINET.COM
  </footer>

  <script src="main.js"></script>
</body>
</html>
